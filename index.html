<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flashcards</title>
    <!--
      In the multi-file setup, index.html is just a shell.
      Vite reads this file, finds the <script> below, and uses
      it as the entry point to bundle the whole app.
      The font link stays here because it's a global resource,
      not tied to any specific component.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <!--
      type="module" tells the browser (and Vite) that this script
      uses ES module syntax (import/export). Vite intercepts this
      during development and bundles it for production.
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
